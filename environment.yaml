# Conda 환경 설정 파일
# Snakemake 및 기본 의존성 패키지

name: wgs-tertiary-pipeline

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # 핵심 워크플로우 엔진
  - python=3.11
  - snakemake>=7.32.4
  
  # 컨테이너 지원 (Singularity/Apptainer는 시스템에 별도 설치 필요)
  # - singularity-ce  # conda에서 설치 불가, 시스템 패키지 관리자 사용
  
  # VCF/BAM 처리 도구
  - bcftools>=1.17
  - htslib>=1.17  # tabix는 htslib에 포함됨
  - pysam  # VCF/BAM 파일 파싱 (svpack에서 사용)
  
  # Variant 필터링 도구
  - slivar  # Small variant 필터링
  
  # VEP 및 주석 도구 (주의: 캐시 다운로드 별도 필요)
  - ensembl-vep
  
  # R 및 Bioconductor (DMR 분석용)
  - r-base>=4.3
  - bioconductor-bsseq
  - bioconductor-dss
  - r-ggplot2
  - r-optparse
  
  # 데이터 처리
  - pandas>=2.0
  - numpy>=1.24
  
  # 시각화
  - graphviz
  
  # 유틸리티
  - pip
  
  # pip 패키지
  - pip:
    - snakemake-executor-plugin-slurm  # SLURM 클러스터 지원
    - pulp<2.8  # Snakemake 의존성
    # 참고: svpack은 pip 패키지가 아님. 
    # GitHub에서 다운로드: https://github.com/PacificBiosciences/svpack
    # wget https://raw.githubusercontent.com/PacificBiosciences/svpack/main/svpack
    # chmod +x svpack && mv svpack ~/bin/ (또는 PATH에 포함된 디렉토리)
