# Conda 환경 설정 파일
# Snakemake 및 기본 의존성 패키지

name: wgs-tertiary-pipeline

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # 핵심 워크플로우 엔진
  - python=3.10
  - snakemake>=7.32.4
  
  # 컨테이너 지원 (Singularity/Apptainer는 시스템에 별도 설치 필요)
  # - singularity-ce  # conda에서 설치 불가, 시스템 패키지 관리자 사용
  
  # VCF/BAM 처리 도구
  - bcftools>=1.17
  - htslib>=1.17  # tabix는 htslib에 포함됨
  
  # 데이터 처리
  - pandas>=2.0
  - numpy>=1.24
  
  # 시각화
  - graphviz
  
  # 유틸리티
  - pip
  
  # pip 패키지
  - pip:
    - snakemake-executor-plugin-slurm  # SLURM 클러스터 지원
    - pulp<2.8  # Snakemake 의존성
